<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0e7490">
<title>Rehab Prescription Pad</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%A9%BA%3C/text%3E%3C/svg%3E">
<style>
  :root{
    --accent:#0e7490; --accent-d:#0b5563; --accent-l:#e0f2f5;
    --ink:#0f172a; --muted:#64748b; --line:#e2e8f0; --bg:#f1f5f9;
    --card:#ffffff; --ok:#15803d; --danger:#dc2626;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--ink); -webkit-text-size-adjust:100%;
  }
  button{font-family:inherit;cursor:pointer}
  input,textarea,select{font-family:inherit}

  /* ---------- App shell ---------- */
  .app{display:flex;flex-direction:column;height:100vh;height:100dvh}
  .topbar{
    display:flex;align-items:center;gap:8px;flex-wrap:wrap;
    padding:10px 14px;padding-top:calc(10px + env(safe-area-inset-top));
    background:#fff;border-bottom:1px solid var(--line);
  }
  .brand{display:flex;align-items:center;gap:9px;margin-right:auto}
  .brand .logo{
    width:34px;height:34px;border-radius:9px;background:var(--accent);
    color:#fff;display:flex;align-items:center;justify-content:center;
    font-weight:800;font-size:16px;
  }
  .brand .t1{font-weight:700;font-size:15px;line-height:1.1}
  .brand .t2{font-size:11px;color:var(--muted)}
  .tbtn{
    border:1px solid var(--line);background:#fff;color:var(--ink);
    padding:8px 12px;border-radius:9px;font-size:13px;font-weight:600;
    display:inline-flex;align-items:center;gap:6px;white-space:nowrap;
  }
  .tbtn:hover{background:#f8fafc}
  .tbtn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
  .tbtn.primary:hover{background:var(--accent-d)}
  .tbtn:disabled{opacity:.55;cursor:default}
  .gdot{width:8px;height:8px;border-radius:50%;background:#22c55e;display:none}
  .gdot.on{display:inline-block}

  /* ---------- Mobile tabs ---------- */
  .tabs{display:flex;background:#fff;border-bottom:1px solid var(--line)}
  .tab{
    flex:1;padding:12px;background:none;border:none;font-size:14px;font-weight:600;
    color:var(--muted);border-bottom:2px solid transparent;
  }
  .tab.active{color:var(--accent);border-bottom-color:var(--accent)}

  /* ---------- Layout ---------- */
  .main{flex:1;overflow:hidden;display:flex;min-height:0}
  .pane{display:none;overflow-y:auto;-webkit-overflow-scrolling:touch;height:100%}
  .pane.active{display:block}
  .form-pane{flex:1;padding:14px}
  .preview-pane{
    width:46%;max-width:560px;background:#e9eef3;border-left:1px solid var(--line);
    padding:18px;
  }

  /* ---------- Cards ---------- */
  .card{
    background:var(--card);border:1px solid var(--line);border-radius:13px;
    margin:0 auto 12px;max-width:760px;overflow:hidden;
  }
  .card-h{
    display:flex;align-items:center;gap:9px;padding:13px 15px;
    background:#fff;user-select:none;
  }
  .card.collapsible .card-h{cursor:pointer}
  .card-title{font-weight:700;font-size:14px;flex:1}
  .badge{
    background:var(--accent-l);color:var(--accent-d);font-size:11px;font-weight:700;
    padding:2px 8px;border-radius:20px;min-width:22px;text-align:center;
  }
  .badge.zero{background:#f1f5f9;color:#94a3b8}
  .chev{color:var(--muted);font-size:13px;transition:transform .15s}
  .card.collapsed .chev{transform:rotate(-90deg)}
  .card.collapsed .card-b{display:none}
  .card-b{padding:4px 15px 15px;border-top:1px solid var(--line)}

  .group-label{
    max-width:760px;margin:18px auto 8px;padding:0 4px;
    font-size:12px;font-weight:800;letter-spacing:.09em;color:var(--accent-d);
    text-transform:uppercase;
  }

  /* ---------- Fields ---------- */
  .fld{margin-top:12px}
  .fld label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:5px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  input[type=text],input[type=date],input[type=number],textarea,select{
    width:100%;border:1px solid var(--line);border-radius:9px;
    padding:10px 11px;font-size:16px;color:var(--ink);background:#fff;
  }
  input:focus,textarea:focus,select:focus{outline:2px solid var(--accent-l);border-color:var(--accent)}
  textarea{resize:vertical;min-height:64px;line-height:1.45}

  /* ---------- Checkable items ---------- */
  .items{display:flex;flex-direction:column;gap:2px;margin-top:6px}
  .item-wrap{padding:3px 0}
  .item{
    display:flex;align-items:flex-start;gap:10px;padding:8px 8px;
    border-radius:8px;cursor:pointer;
  }
  .item:hover{background:#f8fafc}
  .item input[type=checkbox]{
    width:20px;height:20px;margin-top:1px;accent-color:var(--accent);flex:none;cursor:pointer;
  }
  .item span.lbl{font-size:14px;line-height:1.35;flex:1}
  .item .x{
    border:none;background:none;color:#cbd5e1;font-size:17px;line-height:1;
    padding:0 4px;flex:none;
  }
  .item .x:hover{color:var(--danger)}
  .detail{display:none;margin:2px 0 4px 38px}
  .item-wrap.on .detail{display:block}
  .detail input{font-size:14px;padding:7px 10px;background:#fbfdfe}

  .add-btn{
    margin-top:9px;border:1px dashed var(--line);background:#fbfdfe;color:var(--accent-d);
    padding:9px;border-radius:9px;font-size:13px;font-weight:600;width:100%;
  }
  .add-btn:hover{border-color:var(--accent);background:var(--accent-l)}

  .hint{font-size:11.5px;color:var(--muted);margin-top:8px;line-height:1.5}
  .hint a{color:var(--accent);cursor:pointer;text-decoration:underline}

  /* ---------- Preview ---------- */
  .preview-wrap{overflow:hidden}
  .rx-page{
    width:794px;min-height:1123px;background:#fff;
    box-shadow:0 6px 26px rgba(15,23,42,.16);
    transform-origin:top center;
  }
  .rx-page{ color:#15202b;padding:46px 48px 40px;font-size:12px;line-height:1.5; }
  .rx-docname{
    font-family:Georgia,"Times New Roman",serif;font-weight:700;
    font-size:27px;text-align:center;letter-spacing:.3px;color:#0b3a44;
  }
  .rx-spec{text-align:center;font-size:11px;font-weight:700;letter-spacing:.13em;
    text-transform:uppercase;color:#0e7490;margin-top:2px}
  .rx-cred{text-align:center;font-size:10px;color:#475569;margin-top:1px}
  .rx-hr{border:none;border-top:1px solid #cbd5e1;margin:9px 0}
  .rx-hr.thick{border-top:2.5px solid #0e7490;margin:7px 0 0}
  .rx-clinics{display:grid;grid-template-columns:1fr 1fr;gap:1px 26px;margin:2px 0}
  .rx-clinic{font-size:9.5px;line-height:1.4}
  .rx-clinic b{color:#15202b}
  .rx-clinic span{color:#64748b}
  .rx-contact{text-align:center;font-size:9.5px;color:#475569;margin-top:4px}

  .rx-patient{
    display:grid;grid-template-columns:1fr 1fr;gap:6px 24px;
    border:1px solid #cbd5e1;border-radius:8px;padding:11px 14px;margin-top:14px;
  }
  .rx-pf{display:flex;gap:7px;font-size:11.5px;align-items:baseline}
  .rx-pf .k{font-weight:700;color:#0e7490;white-space:nowrap}
  .rx-pf .v{flex:1;border-bottom:1px solid #cbd5e1;min-height:15px;font-weight:600}

  .rx-title{
    text-align:center;font-weight:800;font-size:16px;letter-spacing:.06em;
    text-transform:uppercase;color:#0b3a44;margin:16px 0 4px;
    padding-bottom:6px;border-bottom:2px solid #0e7490;
  }
  .rx-field{margin-top:11px;font-size:12px}
  .rx-field .k{font-weight:800;color:#0e7490;text-transform:uppercase;
    font-size:10.5px;letter-spacing:.04em}
  .rx-field .v{margin-top:2px;white-space:pre-wrap}
  .rx-sech{
    font-weight:800;font-size:11px;letter-spacing:.05em;text-transform:uppercase;
    color:#0b3a44;margin:14px 0 5px;padding-bottom:3px;border-bottom:1.5px solid #bae0e7;
  }
  .rx-exgroup{margin-top:14px}
  .rx-exgroup>.rx-sech{margin-top:0}
  .rx-subh{font-weight:700;font-size:10.5px;color:#0e7490;margin:9px 0 3px}
  .rx-block{margin-top:2px}
  .rx-chips{display:flex;flex-wrap:wrap;gap:4px 7px;margin:3px 0}
  .rx-chip{font-size:11px;background:#f0f9fb;border:1px solid #cce9ee;
    border-radius:5px;padding:2px 8px}
  .rx-ul{list-style:none;margin:3px 0}
  .rx-ul li{font-size:11.5px;margin:2px 0;padding-left:2px}
  .rx-note{font-size:11px;color:#334155;margin-top:3px;white-space:pre-wrap;font-style:italic}

  .rx-foot{margin-top:34px;display:flex;justify-content:flex-end}
  .rx-sign{text-align:center;min-width:300px}
  .rx-sigimg{display:block;margin:0 auto -8px;max-width:250px;max-height:80px;object-fit:contain}
  .rx-sigspace{height:46px}
  .rx-sign .line{border-top:1px solid #15202b;margin-bottom:3px}
  .rx-sign .nm{font-weight:800;font-size:12.5px}
  .rx-sign .sm{font-size:10.5px;color:#334155;margin-top:1px}
  .rx-empty{color:#94a3b8;font-style:italic}

  /* ---------- Modal ---------- */
  .overlay{
    position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:50;
    display:none;align-items:flex-start;justify-content:center;padding:24px 14px;
    overflow-y:auto;
  }
  .overlay.open{display:flex}
  .modal{background:#fff;border-radius:14px;width:100%;max-width:560px;margin:auto;overflow:hidden}
  .modal-h{display:flex;align-items:center;padding:15px 17px;border-bottom:1px solid var(--line)}
  .modal-h h3{font-size:15px;flex:1}
  .modal-h .close{border:none;background:none;font-size:22px;color:var(--muted);line-height:1}
  .modal-b{padding:16px 17px;max-height:72vh;overflow-y:auto}
  .modal-f{padding:13px 17px;border-top:1px solid var(--line);display:flex;gap:9px;justify-content:flex-end}

  .mini{border:1px solid var(--line);background:#fff;border-radius:7px;
    padding:6px 11px;font-size:12px;font-weight:600}
  .mini:hover{background:#f8fafc}
  .mini.accent{color:var(--accent);border-color:#bae0e7}
  .mini.danger{color:var(--danger);border-color:#fbcaca}
  .mini.solid{background:var(--accent);color:#fff;border-color:var(--accent)}

  .set-section{font-size:12px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;
    color:var(--accent-d);margin:20px 0 10px;padding-bottom:5px;border-bottom:1px solid var(--line)}
  .set-section:first-child{margin-top:0}
  .set-row{margin-bottom:13px}
  .set-row label{display:block;font-size:12px;font-weight:700;color:var(--ink);margin-bottom:4px}
  .set-row .sub{font-size:11px;color:var(--muted);font-weight:400;margin-bottom:4px}
  .chip-del{display:inline-flex;align-items:center;gap:6px;background:#f1f5f9;
    border-radius:7px;padding:4px 6px 4px 10px;font-size:12px;margin:3px 4px 0 0}
  .chip-del button{border:none;background:none;color:var(--danger);font-size:15px;line-height:1}

  .sig-box{border:1px solid var(--line);border-radius:9px;background:#f8fafc;
    padding:12px;text-align:center;margin-bottom:8px}
  .sig-box img{max-width:100%;max-height:90px;object-fit:contain}
  .sig-box .none{font-size:12px;color:var(--muted);padding:14px 0}

  .gstatus{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;
    padding:10px 12px;border-radius:9px;background:#f8fafc;border:1px solid var(--line);margin-bottom:10px}
  .gstatus .d{width:9px;height:9px;border-radius:50%;background:#cbd5e1;flex:none}
  .gstatus.ok .d{background:#22c55e}
  .glinks{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}

  .saved-item{border:1px solid var(--line);border-radius:10px;padding:11px 12px;margin-bottom:9px}
  .saved-item .nm{font-weight:700;font-size:14px}
  .saved-item .meta{font-size:12px;color:var(--muted);margin-top:2px}
  .saved-item .acts{display:flex;gap:7px;margin-top:9px;flex-wrap:wrap}
  .pg-head{display:flex;align-items:center;gap:8px;margin:16px 0 8px}
  .pg-head .pn{font-weight:800;font-size:14px;color:var(--ink)}
  .pg-head .pc{font-size:11px;color:var(--muted)}
  .pg-head .sp{flex:1}

  /* ---------- Toast ---------- */
  .toast{
    position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);
    background:#0f172a;color:#fff;padding:11px 18px;border-radius:10px;font-size:13px;
    font-weight:600;z-index:80;opacity:0;transition:.25s;pointer-events:none;
    box-shadow:0 8px 24px rgba(0,0,0,.25);max-width:88vw;text-align:center;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  @media(min-width:980px){
    .tabs{display:none}
    .pane{display:block !important}
    .main{display:flex}
  }
  #pdfPage{position:absolute;left:-10000px;top:0;pointer-events:none}

  @media print{
    @page{size:A4;margin:0}
    body{background:#fff}
    .app,.overlay,.toast{display:none !important}
    #pdfPage{position:static;left:0;pointer-events:auto}
    .rx-page{box-shadow:none;width:794px;min-height:auto}
  }
</style>
</head>
<body>

<div class="app" id="app">
  <div class="topbar">
    <div class="brand">
      <div class="logo">Rx</div>
      <div>
        <div class="t1">Rehab Prescription Pad</div>
        <div class="t2">Dr. Villanueva</div>
      </div>
    </div>
    <button class="tbtn" id="btnNew">New</button>
    <button class="tbtn primary" id="btnSave">Save</button>
    <button class="tbtn" id="btnDatabase">Database <span class="gdot" id="gdot"></span></button>
    <button class="tbtn" id="btnSettings">Settings</button>
    <button class="tbtn" id="btnPrint">Print</button>
    <button class="tbtn primary" id="btnPdf">Download PDF</button>
  </div>

  <div class="tabs">
    <button class="tab active" id="tabForm">Edit form</button>
    <button class="tab" id="tabPreview">Preview</button>
  </div>

  <div class="main">
    <div class="pane form-pane active" id="formPane">
      <form id="form" autocomplete="off" onsubmit="return false"></form>
    </div>
    <div class="pane preview-pane" id="previewPane">
      <div class="preview-wrap" id="previewWrap">
        <div class="rx-page" id="previewPage"></div>
      </div>
    </div>
  </div>
</div>

<div class="rx-page" id="pdfPage"></div>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-h">
      <h3 id="modalTitle"></h3>
      <button class="close" id="modalClose">&times;</button>
    </div>
    <div class="modal-b" id="modalBody"></div>
    <div class="modal-f" id="modalFoot"></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="importFile" accept="application/json" style="display:none">
<input type="file" id="sigFile" accept="image/*" style="display:none">

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
"use strict";
/* =========================================================
   Rehab Prescription Pad
   Single-file web app. Data is stored in this browser, and
   (optionally) synced to the doctor's own Google Drive.
   ========================================================= */

/* ---------- Defaults from Dr. Villanueva's form ---------- */
function defaultSettings(){
  return {
    headerName:"KIM RENDELL VILLANUEVA, MD, DPARM",
    specialty:"Physical & Rehabilitation Medicine",
    credentials:[
      "Diplomate, Philippine Academy of Rehabilitation Medicine",
      "Member, Quezon City Medical Society",
      "Member, Philippine Medical Association"
    ],
    clinics:[
      {name:"Accelerated Wellness & Pain Clinic", location:"E. Rodriguez, Quezon City"},
      {name:"AFP Medical Center", location:"Quezon City"},
      {name:"NCDH Physical Therapy & Rehabilitation", location:"North Caloocan"},
      {name:"Healthway Qualimed Hospital", location:"San Jose Del Monte, Bulacan"},
      {name:"Our Lady of Fatima University", location:"Valenzuela City"}
    ],
    teleconsult:"seriousmd.com/doc/kimvillanueva",
    contact:"09762057232",
    docTitle:"Physical Therapy Prescription",
    signatureName:"KIM RENDELL VILLANUEVA, MD",
    prc:"0142732",
    ptr:"",
    signature:"",        /* processed e-signature, data URL */
    googleClientId:"",    /* OAuth client ID for Drive sync */
    customItems:{}
  };
}

/* ---------- Base schema ---------- */
const BASE_SCHEMA = {
  goals:{ title:"Rehab Goals", note:true, noteLabel:"Other goals", items:[
    "To improve strength","To improve gait / ambulation","To decrease pain",
    "To decrease spasticity","To improve ADL participation"]},
  modalities:{ title:"Modalities", note:true, detailAll:true, items:[
    "ES","FES","TENS","HMP","US","ESWT","TECAR","LASER"]},
  rom:{ title:"Range of Motion", group:"ex", note:true, detailAll:true, items:[
    "AROME","AAROME","PROME"]},
  strengthening:{ title:"Strengthening", group:"ex", note:true, detailAll:true, items:[
    "UE","LE"]},
  gps:{ title:"GPS / Stretching", group:"ex", note:true, detailAll:true, items:[
    "UE","LE"]},
  balance:{ title:"Balance / Tolerance", group:"ex", items:[
    "Sitting","Standing"]},
  transitional:{ title:"Transitional Mobility", group:"ex", items:[
    "Supine ↔ Sidelying","Sidelying ↔ Long sitting",
    "Long ↔ Short sitting","Sit ↔ Stand"]},
  transfer:{ title:"Transfer Skills", group:"ex", items:[
    "Bed ↔ Wheelchair"]},
  otherEx:{ title:"Other Exercises & Techniques", group:"ex", note:true, detailAll:true,
    items:[
      "McKenzie exercises","William's exercises","Finger ladder / Shoulder wheel",
      "Coordination exercises","Balance / Proprioception","PNF","NDT / Bobath",
      "Rood's technique","Parallel bar exercises","Ergometer","Treadmill exercises",
      "Stabilization exercises","Mat exercises","Play therapy","Gait retraining",
      "Calliet neck exercises","Trunk / Core exercises","Prehension skills (gross / fine)",
      "Scoliosis-specific exercises (Klapp's / Schroth)","Proper body mechanics",
      "Joint conservation techniques","Postural reeducation","Home exercise program"]}
};
const EX_SECTIONS = ["rom","strengthening","gps","balance","transitional","transfer","otherEx"];

/* ---------- Google constants ---------- */
const SCOPES = "https://www.googleapis.com/auth/drive.file "+
               "https://www.googleapis.com/auth/spreadsheets";
const ROOT_FOLDER = "Rehab Prescription Pad";
const SHEET_NAME  = "Rehab Prescriptions — Master Log";
const SHEET_HEADERS = ["Date","Patient","Age","Diagnosis","Follow-up",
  "PDF","Last updated","Record ID","Data (do not edit)"];

/* ---------- Storage keys ---------- */
const K_SET="rxpad_v1_settings", K_RX="rxpad_v1_prescriptions",
      K_DRAFT="rxpad_v1_draft", K_DRIVE="rxpad_v1_drive";

/* ---------- Helpers ---------- */
const $ = s=>document.querySelector(s);
function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,c=>(
  {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function nl2br(s){return String(s).replace(/\n/g,"<br>");}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function todayISO(){const d=new Date();return new Date(d.getTime()-d.getTimezoneOffset()*60000)
  .toISOString().slice(0,10);}
function fmtDate(iso){
  if(!iso) return "";
  const d=new Date(iso+"T00:00:00");
  if(isNaN(d)) return iso;
  return d.toLocaleDateString("en-US",{year:"numeric",month:"long",day:"numeric"});
}
function setPath(o,p,v){const k=p.split(".");let c=o;
  for(let i=0;i<k.length-1;i++){c=c[k[i]]=c[k[i]]||{};}c[k[k.length-1]]=v;}
function load(key,fb){try{const v=localStorage.getItem(key);return v?JSON.parse(v):fb;}
  catch(e){return fb;}}
function save(key,val){try{localStorage.setItem(key,JSON.stringify(val));}catch(e){
  toast("Could not save locally – storage may be full");}}
function clone(o){return JSON.parse(JSON.stringify(o));}

/* ---------- State ---------- */
let SETTINGS = Object.assign(defaultSettings(), load(K_SET,{}));
if(!SETTINGS.customItems) SETTINGS.customItems={};
let SAVED = load(K_RX,[]);
let DRIVE = load(K_DRIVE,{rootId:null,sheetId:null,patientFolders:{}});
let RX = load(K_DRAFT,null) || blankRx();
if(RX.signed===undefined) RX.signed=true;

function blankRx(){
  return { id:null, createdAt:Date.now(), updatedAt:Date.now(),
    patient:{name:"",address:"",date:todayISO(),age:""},
    diagnosis:"", precautions:"", frequency:"", followUp:"",
    signed:true, driveFileId:null, pdfLink:"",
    sections:{} };
}

function getSchema(){
  const s=clone(BASE_SCHEMA);
  const ci=SETTINGS.customItems||{};
  Object.keys(ci).forEach(sec=>{
    if(!s[sec]) return;
    (ci[sec]||[]).forEach(lbl=>{ if(!s[sec].items.includes(lbl)) s[sec].items.push(lbl); });
  });
  return s;
}
function isCustom(sec,item){return ((SETTINGS.customItems||{})[sec]||[]).includes(item);}
function itemHasDetail(sec,item){
  const sc=BASE_SCHEMA[sec]||{};
  if(sc.detailAll) return true;
  if((sc.detailItems||[]).includes(item)) return true;
  if(isCustom(sec,item)) return true;
  return false;
}
function secData(sec){
  if(!RX.sections[sec]) RX.sections[sec]={items:{},note:""};
  if(!RX.sections[sec].items) RX.sections[sec].items={};
  return RX.sections[sec];
}
function itemData(sec,item){
  const d=secData(sec);
  if(!d.items[item]) d.items[item]={on:false,detail:""};
  return d.items[item];
}
function sectionCount(sec){
  const d=RX.sections[sec];
  if(!d||!d.items) return 0;
  return Object.values(d.items).filter(x=>x&&x.on).length;
}

function card(id,title,collapsed,body){
  const withBadge = !!BASE_SCHEMA[id];
  return `<section class="card collapsible ${collapsed?'collapsed':''}" data-card="${id}">
    <div class="card-h" data-toggle="${id}">
      <span class="card-title">${title}</span>
      ${withBadge?`<span class="badge zero" data-badge="${id}">0</span>`:""}
      <span class="chev">&#9662;</span>
    </div>
    <div class="card-b">${body}</div>
  </section>`;
}

function sectionCard(sec,collapsed){
  const sc=getSchema()[sec];
  let rows="";
  sc.items.forEach(item=>{ rows+=itemRow(sec,item); });
  let body=`<div class="items">${rows}</div>
    <button type="button" class="add-btn" data-add="${sec}">+ Add item to this list</button>`;
  if(sc.note){
    const d=RX.sections[sec]||{};
    body+=`<div class="fld"><label>${esc(sc.noteLabel||"Other / notes")}</label>
      <textarea data-sec="${sec}" data-role="note"
        placeholder="Anything not listed above">${esc(d.note||"")}</textarea></div>`;
  }
  return card(sec,sc.title,collapsed,body);
}

function itemRow(sec,item){
  const d=itemData(sec,item);
  const on=!!d.on;
  const hasDetail=itemHasDetail(sec,item);
  const custom=isCustom(sec,item);
  let detail="";
  if(hasDetail){
    detail=`<div class="detail"><input type="text" data-sec="${sec}" data-role="detail"
      data-item="${esc(item)}" value="${esc(d.detail||"")}"
      placeholder="custom description / parameters"></div>`;
  }
  return `<div class="item-wrap ${on?'on':''}">
    <label class="item">
      <input type="checkbox" data-sec="${sec}" data-role="check"
        data-item="${esc(item)}" ${on?"checked":""}>
      <span class="lbl">${esc(item)}</span>
      ${custom?`<button type="button" class="x" data-del-custom="${sec}"
        data-item="${esc(item)}" title="Remove custom item">&times;</button>`:""}
    </label>
    ${detail}
  </div>`;
}

$("#form").addEventListener("input",e=>{

  if(t.dataset.bind){
    setPath(RX,t.dataset.bind,t.value);

    setPath(RX,t.dataset.bindbool,t.checked);
  }else if(t.dataset.sec){
    const sec=t.dataset.sec, role=t.dataset.role;
    if(role==="check"){
      itemData(sec,t.dataset.item).on=t.checked;
      const wrap=t.closest(".item-wrap");
      if(wrap) wrap.classList.toggle("on",t.checked);
      refreshBadges();
    }else if(role==="detail"){
      itemData(sec,t.dataset.item).detail=t.value;
    }else if(role==="note"){
      secData(sec).note=t.value;
    }
  }
  RX.updatedAt=Date.now();
  refreshPreview();
  scheduleAutosave();
});

$("#form").addEventListener("click",e=>{
  const toggle=e.target.closest("[data-toggle]");
  if(toggle && !e.target.closest("input,textarea,a,button.add-btn,.x")){
    toggle.closest(".card").classList.toggle("collapsed"); return;
  }
  const add=e.target.closest("[data-add]");
  if(add){ addCustomItem(add.dataset.add); return; }
  const del=e.target.closest("[data-del-custom]");
  if(del){ e.preventDefault(); removeCustomItem(del.dataset.delCustom,del.dataset.item); return; }
  if(e.target.closest("[data-open-settings]")){ showSettings(); }
});

  document.querySelectorAll("[data-badge]").forEach(b=>{

   ========================================================= */
function addCustomItem(sec){
  const label=(prompt("Add a new item to “"+getSchema()[sec].title+"”:")||"").trim();
  if(!label) return;
  if(getSchema()[sec].items.map(x=>x.toLowerCase()).includes(label.toLowerCase())){
    toast("That item already exists"); return; }
  if(!SETTINGS.customItems[sec]) SETTINGS.customItems[sec]=[];
  SETTINGS.customItems[sec].push(label);
  save(K_SET,SETTINGS);
  rebuildKeepState();
  toast("Added “"+label+"”");
}
function removeCustomItem(sec,item){
  if(!confirm("Remove the custom item “"+item+"” from this list?")) return;
  SETTINGS.customItems[sec]=(SETTINGS.customItems[sec]||[]).filter(x=>x!==item);
  if(RX.sections[sec]&&RX.sections[sec].items) delete RX.sections[sec].items[item];
  save(K_SET,SETTINGS);
  rebuildKeepState();
  toast("Removed");
}
function rebuildKeepState(){
  const openState={};
  document.querySelectorAll(".card[data-card]").forEach(c=>{
    openState[c.dataset.card]=!c.classList.contains("collapsed");
  });
  buildForm();
  document.querySelectorAll(".card[data-card]").forEach(c=>{
    if(c.dataset.card in openState)
      c.classList.toggle("collapsed",!openState[c.dataset.card]);
  });
  refreshPreview();
  save(K_DRAFT,RX);
}

    <div class="v">${nl2br(esc(value.trim()))}</div></div>`;

function secBlockHTML(sec,sub){
  const sc=getSchema()[sec];
  const d=RX.sections[sec]||{items:{},note:""};
  const sel=[];
  sc.items.forEach(item=>{
    const x=d.items?d.items[item]:null;
    if(x&&x.on) sel.push({label:item,detail:(x.detail||"").trim()});
  });
  const note=(d.note||"").trim();
  if(!sel.length && !note) return "";
  const plain=sel.filter(s=>!s.detail);
  const det=sel.filter(s=>s.detail);
  let inner="";
  if(plain.length)
    inner+=`<div class="rx-chips">`+plain.map(s=>
      `<span class="rx-chip">✓ ${esc(s.label)}</span>`).join("")+`</div>`;
  if(det.length)
    inner+=`<ul class="rx-ul">`+det.map(s=>
      `<li>✓ <b>${esc(s.label)}</b> &mdash; ${esc(s.detail)}</li>`).join("")+`</ul>`;
  if(note) inner+=`<div class="rx-note">${nl2br(esc(note))}</div>`;
  const h=sub?`<div class="rx-subh">${esc(sc.title)}</div>`
             :`<div class="rx-sech">${esc(sc.title)}</div>`;
  return `<div class="rx-block">${h}${inner}</div>`;
}

function rxFilename(rx,ext){
  rx=rx||RX;
  const nm=(rx.patient.name||"Patient").replace(/[^\w \-]/g,"").trim()||"Patient";
  const dt=rx.patient.date||todayISO();
  return `PT Prescription - ${nm} - ${dt}.${ext}`;
}
async function buildPDFDoc(){
  $("#pdfPage").innerHTML=previewHTML();
  await new Promise(r=>setTimeout(r,140));
  const node=$("#pdfPage");
  const canvas=await html2canvas(node,{
    scale:2.5, backgroundColor:"#ffffff", useCORS:true,
    windowWidth:794, width:794, height:node.offsetHeight });
  const img=canvas.toDataURL("image/jpeg",0.96);
  const {jsPDF}=window.jspdf;
  const pdf=new jsPDF("p","mm","a4");
  const PW=210, PH=297;
  let iw=PW, ih=canvas.height*PW/canvas.width;
  if(ih<=PH){
    pdf.addImage(img,"JPEG",0,0,iw,ih,undefined,"FAST");
  }else if(ih<=PH*1.22){
    ih=PH; iw=canvas.width*PH/canvas.height;
    pdf.addImage(img,"JPEG",(PW-iw)/2,0,iw,ih,undefined,"FAST");
  }else{
    let left=ih,pos=0;
    pdf.addImage(img,"JPEG",0,0,iw,ih,undefined,"FAST"); left-=PH;
    while(left>0){ pos-=PH; pdf.addPage();
      pdf.addImage(img,"JPEG",0,pos,iw,ih,undefined,"FAST"); left-=PH; }
  }
  return pdf;
}
async function downloadPDF(){
  const btn=$("#btnPdf"); btn.disabled=true; const old=btn.textContent;
  btn.textContent="Generating…";
  try{
    const pdf=await buildPDFDoc();
    pdf.save(rxFilename(RX,"pdf"));
    toast("PDF downloaded");
  }catch(err){ console.error(err); toast("PDF failed – try the Print button instead"); }
  finally{ btn.disabled=false; btn.textContent=old; }
}
function printRx(){
  $("#pdfPage").innerHTML=previewHTML();
  setTimeout(()=>window.print(),80);
}

/* =========================================================
   GOOGLE DRIVE  +  SHEETS
   ========================================================= */
let GA = { token:null, exp:0, tokenClient:null, connected:false };

function gisReady(){ return !!(window.google&&google.accounts&&google.accounts.oauth2); }
function whenGisReady(cb){
  if(gisReady()){ cb(); return; }
  let n=0; const t=setInterval(()=>{ if(gisReady()||++n>40){ clearInterval(t); if(gisReady())cb(); } },150);
}
function requestToken(mode){
  return new Promise((resolve,reject)=>{
    if(!SETTINGS.googleClientId){
      reject(new Error("Add your Google Client ID in Settings first.")); return; }
    if(!gisReady()){
      reject(new Error("Google sign-in is still loading – try again in a moment.")); return; }
    if(!GA.tokenClient){
      GA.tokenClient=google.accounts.oauth2.initTokenClient({
        client_id:SETTINGS.googleClientId, scope:SCOPES,
        callback:()=>{}, error_callback:()=>{} });
    }
    GA.tokenClient.callback=resp=>{
      if(resp&&resp.access_token){
        GA.token=resp.access_token;
        GA.exp=Date.now()+((resp.expires_in||3600)*1000);
        resolve(GA.token);
      }else reject(new Error("Google sign-in was cancelled."));
    };
    GA.tokenClient.error_callback=err=>
      reject(new Error("Google sign-in failed ("+((err&&err.type)||"unknown")+")."));
    GA.tokenClient.requestAccessToken({prompt:mode});
  });
}
function ensureToken(){
  if(GA.token&&Date.now()<GA.exp-60000) return Promise.resolve(GA.token);
  return requestToken("");
}
async function api(url,opts){
  opts=opts||{};
  let token=await ensureToken();
  const send=t=>{
    const h=Object.assign({},opts.headers,{Authorization:"Bearer "+t});
    return fetch(url,Object.assign({},opts,{headers:h}));
  };
  let res=await send(token);
  if(res.status===401){
    GA.token=null; GA.exp=0;
    res=await send(await ensureToken());
  }
  if(!res.ok){
    let msg=res.status+"";
    try{ const j=await res.json(); msg=(j.error&&j.error.message)||msg; }catch(e){}
    throw new Error("Google API "+msg);
  }
  return res;
}
const qEsc=s=>String(s).replace(/\\/g,"\\\\").replace(/'/g,"\\'");

async function driveFind(query){
  const res=await api("https://www.googleapis.com/drive/v3/files?q="+
    encodeURIComponent(query)+"&fields=files(id,name)&spaces=drive&pageSize=20");
  return (await res.json()).files||[];
}
async function driveCreate(meta){
  const res=await api("https://www.googleapis.com/drive/v3/files?fields=id,webViewLink",
    {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(meta)});
  return await res.json();
}
async function setupDrive(){
  if(DRIVE.rootId&&DRIVE.sheetId) return;
  let f=await driveFind("mimeType='application/vnd.google-apps.folder' and name='"+
    qEsc(ROOT_FOLDER)+"' and trashed=false");
  const root=f[0]||await driveCreate(
    {name:ROOT_FOLDER,mimeType:"application/vnd.google-apps.folder"});
  DRIVE.rootId=root.id;
  let s=await driveFind("mimeType='application/vnd.google-apps.spreadsheet' and '"+
    root.id+"' in parents and trashed=false");
  let sheet=s[0];
  if(!sheet){
    sheet=await driveCreate({name:SHEET_NAME,
      mimeType:"application/vnd.google-apps.spreadsheet",parents:[root.id]});
    await sheetWriteHeader(sheet.id);
  }
  DRIVE.sheetId=sheet.id;
  DRIVE.patientFolders=DRIVE.patientFolders||{};
  save(K_DRIVE,DRIVE);
}
async function sheetWriteHeader(id){
  await api("https://sheets.googleapis.com/v4/spreadsheets/"+id+
    "/values/A1?valueInputOption=RAW",
    {method:"PUT",headers:{"Content-Type":"application/json"},
     body:JSON.stringify({values:[SHEET_HEADERS]})});
  try{
    await api("https://sheets.googleapis.com/v4/spreadsheets/"+id+":batchUpdate",
      {method:"POST",headers:{"Content-Type":"application/json"},
       body:JSON.stringify({requests:[
        {repeatCell:{range:{sheetId:0,startRowIndex:0,endRowIndex:1},
          cell:{userEnteredFormat:{textFormat:{bold:true},
            backgroundColor:{red:.88,green:.95,blue:.96}}},
          fields:"userEnteredFormat(textFormat,backgroundColor)"}},
        {updateSheetProperties:{properties:{sheetId:0,
          gridProperties:{frozenRowCount:1}},fields:"gridProperties.frozenRowCount"}}
       ]})});
  }catch(e){ /* formatting is cosmetic */ }
}
async function drivePatientFolder(name){
  const key=(name||"Unfiled").trim()||"Unfiled";
  if(DRIVE.patientFolders[key]) return DRIVE.patientFolders[key];
  let f=await driveFind("mimeType='application/vnd.google-apps.folder' and name='"+
    qEsc(key)+"' and '"+DRIVE.rootId+"' in parents and trashed=false");
  const folder=f[0]||await driveCreate({name:key,
    mimeType:"application/vnd.google-apps.folder",parents:[DRIVE.rootId]});
  DRIVE.patientFolders[key]=folder.id;
  save(K_DRIVE,DRIVE);
  return folder.id;
}
async function driveUploadPDF(folderId,name,blob,existingId){
  if(existingId){
    try{
      const res=await api("https://www.googleapis.com/upload/drive/v3/files/"+
        existingId+"?uploadType=media&fields=id,webViewLink",
        {method:"PATCH",headers:{"Content-Type":"application/pdf"},body:blob});
      return await res.json();
    }catch(e){ /* file may have been removed - fall through to create */ }
  }
  const boundary="rxpad"+Date.now();
  const body=new Blob([
    "--"+boundary+"\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n",
    JSON.stringify({name:name,parents:[folderId]}),
    "\r\n--"+boundary+"\r\nContent-Type: application/pdf\r\n\r\n",
    blob, "\r\n--"+boundary+"--"]);
  const res=await api("https://www.googleapis.com/upload/drive/v3/files"+
    "?uploadType=multipart&fields=id,webViewLink",
    {method:"POST",headers:{"Content-Type":"multipart/related; boundary="+boundary},body:body});
  return await res.json();
}
function sheetRow(rx){
  const pdf=rx.pdfLink?'=HYPERLINK("'+rx.pdfLink+'","Open PDF")':"";
  return [
    fmtDate(rx.patient.date), rx.patient.name||"", rx.patient.age||"",
    (rx.diagnosis||"").replace(/\s+/g," ").trim(),
    (rx.followUp||"").replace(/\s+/g," ").trim(),
    pdf, new Date(rx.updatedAt||Date.now()).toLocaleString(),
    rx.id, JSON.stringify(rx)];
}
async function sheetRowIndex(id){
  const res=await api("https://sheets.googleapis.com/v4/spreadsheets/"+
    DRIVE.sheetId+"/values/H2:H100000");
  const ids=((await res.json()).values||[]).map(r=>r[0]);
  const i=ids.indexOf(id);
  return i<0?-1:i+2;
}
async function sheetUpsert(rx){
  const n=await sheetRowIndex(rx.id);
  const row=[sheetRow(rx)];
  if(n>0){
    await api("https://sheets.googleapis.com/v4/spreadsheets/"+DRIVE.sheetId+
      "/values/A"+n+":I"+n+"?valueInputOption=USER_ENTERED",
      {method:"PUT",headers:{"Content-Type":"application/json"},
       body:JSON.stringify({values:row})});
  }else{
    await api("https://sheets.googleapis.com/v4/spreadsheets/"+DRIVE.sheetId+
      "/values/A1:append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS",
      {method:"POST",headers:{"Content-Type":"application/json"},
       body:JSON.stringify({values:row})});
  }
}
async function sheetDeleteRow(id){
  const n=await sheetRowIndex(id);
  if(n<0) return;
  await api("https://sheets.googleapis.com/v4/spreadsheets/"+DRIVE.sheetId+":batchUpdate",
    {method:"POST",headers:{"Content-Type":"application/json"},
     body:JSON.stringify({requests:[{deleteDimension:{range:{
       sheetId:0,dimension:"ROWS",startIndex:n-1,endIndex:n}}}]})});
}
async function saveToDrive(rx){
  await setupDrive();
  const folder=await drivePatientFolder(rx.patient.name);
  const pdf=await buildPDFDoc();
  const blob=pdf.output("blob");
  const up=await driveUploadPDF(folder,rxFilename(rx,"pdf"),blob,rx.driveFileId);
  rx.driveFileId=up.id;
  rx.pdfLink=up.webViewLink||rx.pdfLink;
  await sheetUpsert(rx);
  upsertLocal(rx);
  if(rx===RX) save(K_DRAFT,RX);
}
async function syncFromDrive(){
  await setupDrive();
  const res=await api("https://sheets.googleapis.com/v4/spreadsheets/"+
    DRIVE.sheetId+"/values/A2:I100000");
  const rows=(await res.json()).values||[];
  const recs=[];
  rows.forEach(r=>{
    if(!r[8]) return;
    try{ const rx=JSON.parse(r[8]); if(rx&&rx.id) recs.push(rx); }catch(e){}
  });
  const driveIds=new Set(recs.map(r=>r.id));
  const localOnly=SAVED.filter(r=>!driveIds.has(r.id));
  SAVED=recs.concat(localOnly);
  save(K_RX,SAVED);
}
async function connectGoogle(){
  try{
    await ensureToken();
    await setupDrive();
    GA.connected=true;
    updateGoogleUI();
    toast("Connecting – loading your prescriptions…");
    await syncFromDrive();
    updateGoogleUI();
    renderDbList($("#dbSearch")?$("#dbSearch").value:"");
    toast("Connected to Google Drive ✓");
  }catch(e){ console.error(e); toast(e.message||"Could not connect to Google"); }
}
function signOutGoogle(){
  if(GA.token&&gisReady()){ try{google.accounts.oauth2.revoke(GA.token);}catch(e){} }
  GA.token=null; GA.exp=0; GA.connected=false;
  updateGoogleUI();
  toast("Signed out of Google");
}
function updateGoogleUI(){
  $("#gdot").classList.toggle("on",GA.connected);
  if($("#gPanel")) renderGPanel();
}
function autoConnect(){
  if(!SETTINGS.googleClientId||!DRIVE.sheetId) return;
  whenGisReady(()=>{
    requestToken("none").then(async()=>{
      try{ GA.connected=true; await syncFromDrive(); updateGoogleUI(); }
      catch(e){ console.error(e); }
    }).catch(()=>{ /* needs an explicit sign-in click */ });
  });
}

function renderGPanel(){
  const p=$("#gPanel"); if(!p) return;
  if(!SETTINGS.googleClientId){
    p.innerHTML=`<div class="gstatus"><span class="d"></span>
      <span>Google Drive not set up</span></div>
      <div class="hint">Add your Google Client ID in
      <a data-go-settings="1">Settings</a> to sync prescriptions to Drive and a Google Sheet.</div>`;
    p.querySelector("[data-go-settings]").onclick=()=>{closeModal();showSettings();};
    return;
  }
  if(!GA.connected){
    p.innerHTML=`<div class="gstatus"><span class="d"></span>
      <span>Not connected to Google Drive</span></div>
      <button class="mini solid" id="gConnect">Connect Google Drive</button>`;
    p.querySelector("#gConnect").onclick=connectGoogle;
    return;
  }
  const folderLink=DRIVE.rootId?"https://drive.google.com/drive/folders/"+DRIVE.rootId:"";
  const sheetLink=DRIVE.sheetId?"https://docs.google.com/spreadsheets/d/"+DRIVE.sheetId:"";
  p.innerHTML=`<div class="gstatus ok"><span class="d"></span>
      <span>Connected to Google Drive</span></div>
    <div class="glinks">
      <button class="mini" id="gRefresh">Refresh from Drive</button>
      ${sheetLink?`<a class="mini accent" href="${sheetLink}" target="_blank" rel="noopener">Open master Sheet</a>`:""}
      ${folderLink?`<a class="mini accent" href="${folderLink}" target="_blank" rel="noopener">Open Drive folder</a>`:""}
      <button class="mini danger" id="gOut">Sign out</button>
    </div>`;
  p.querySelector("#gRefresh").onclick=async()=>{
    toast("Refreshing…");
    try{ await syncFromDrive(); renderDbList($("#dbSearch").value); toast("Up to date ✓"); }
    catch(e){ toast(e.message); }
  };
  p.querySelector("#gOut").onclick=()=>{ signOutGoogle(); renderGPanel(); };
}
function renderDbList(q){
  q=(q||"").toLowerCase();
  const list=$("#dbList"); if(!list) return;
  let rows=SAVED.slice();
  if(q) rows=rows.filter(r=>
    (r.patient.name||"").toLowerCase().includes(q) ||
    (r.diagnosis||"").toLowerCase().includes(q));
  if(!rows.length){
    list.innerHTML=`<div class="hint" style="text-align:center;padding:20px">
      ${SAVED.length?"No matches.":"No prescriptions saved yet. Fill the form and press Save."}</div>`;
    return;
  }
  /* group by patient */
  const groups={};
  rows.forEach(r=>{
    const k=(r.patient.name||"Unnamed patient").trim()||"Unnamed patient";
    (groups[k]=groups[k]||[]).push(r);
  });
  const names=Object.keys(groups).sort((a,b)=>a.localeCompare(b));
  let html="";
  names.forEach(name=>{
    const recs=groups[name].sort((a,b)=>(b.updatedAt||0)-(a.updatedAt||0));
    const latest=recs[0];
    html+=`<div class="pg-head">
      <span class="pn">${esc(name)}</span>
      <span class="pc">${recs.length} prescription${recs.length>1?"s":""}</span>
      <span class="sp"></span>
      <button class="mini accent" data-newfor="${esc(name)}">+ New for this patient</button>
    </div>`;
    recs.forEach(r=>{
      html+=`<div class="saved-item">
        <div class="meta"><b style="color:#0f172a">${esc(fmtDate(r.patient.date)||"—")}</b>
          ${r.diagnosis?" &middot; "+esc(r.diagnosis.slice(0,80)):""}</div>
        <div class="acts">
          <button class="mini accent" data-open="${r.id}">Open</button>
          <button class="mini" data-dup="${r.id}">Duplicate</button>
          ${r.pdfLink?`<a class="mini" href="${esc(r.pdfLink)}" target="_blank" rel="noopener">PDF in Drive</a>`:""}
          <button class="mini danger" data-del="${r.id}">Delete</button>
        </div>
      </div>`;
    });
    void latest;
  });
  list.innerHTML=html;
  list.querySelectorAll("[data-open]").forEach(b=>b.onclick=()=>openRx(b.dataset.open));
  list.querySelectorAll("[data-dup]").forEach(b=>b.onclick=()=>duplicateRx(b.dataset.dup));
  list.querySelectorAll("[data-del]").forEach(b=>b.onclick=()=>deleteRx(b.dataset.del));
  list.querySelectorAll("[data-newfor]").forEach(b=>b.onclick=()=>{
    const recs=groups[b.dataset.newfor];
    const latest=recs.sort((a,b)=>(b.updatedAt||0)-(a.updatedAt||0))[0];
    newRx({name:latest.patient.name,age:latest.patient.age,address:latest.patient.address});
  });
}

  SETTINGS.contact=v("setContact").trim();

  SETTINGS.signatureName=v("setSign").trim();

/* ---- Signature image processing (background removal) ---- */
$("#sigFile").addEventListener("change",e=>{
  const file=e.target.files[0]; e.target.value="";
  if(!file) return;
  toast("Processing signature…");
  processSignature(file).then(dataUrl=>{
    SETTINGS.signature=dataUrl;
    save(K_SET,SETTINGS);
    refreshPreview();
    if($("#overlay").classList.contains("open")) showSettings();
    toast("Signature saved ✓");
  }).catch(err=>{ console.error(err); toast("Could not read that image"); });
});
function processSignature(file){
  return new Promise((resolve,reject)=>{
    const img=new Image();
    img.onload=()=>{
      try{
        const c=document.createElement("canvas");
        c.width=img.naturalWidth; c.height=img.naturalHeight;
        const x=c.getContext("2d");
        x.drawImage(img,0,0);
        const d=x.getImageData(0,0,c.width,c.height), p=d.data;
        const lum=i=>0.299*p[i]+0.587*p[i+1]+0.114*p[i+2];
        const corner=(px,py)=>lum((py*c.width+px)*4);
        const m=3;
        const bg=(corner(m,m)+corner(c.width-1-m,m)+
                  corner(m,c.height-1-m)+corner(c.width-1-m,c.height-1-m))/4;
        const darkBg=bg<128;
        let maxc=0;
        for(let i=0;i<p.length;i+=4){
          const diff=darkBg?lum(i)-bg:bg-lum(i);
          if(diff>maxc) maxc=diff;
        }
        const full=Math.max(22,maxc*0.62);
        const ink=[16,24,40];
        let minX=c.width,minY=c.height,maxX=0,maxY=0;
        for(let py=0;py<c.height;py++){
          for(let px=0;px<c.width;px++){
            const i=(py*c.width+px)*4;
            const diff=darkBg?lum(i)-bg:bg-lum(i);
            let a=Math.round(Math.min(1,Math.max(0,diff/full))*255);
            p[i]=ink[0];p[i+1]=ink[1];p[i+2]=ink[2];p[i+3]=a;
            if(a>45){
              if(px<minX)minX=px; if(px>maxX)maxX=px;
              if(py<minY)minY=py; if(py>maxY)maxY=py;
            }
          }
        }
        x.putImageData(d,0,0);
        if(maxX<=minX||maxY<=minY){ resolve(c.toDataURL("image/png")); return; }
        const pad=Math.round(Math.max(c.width,c.height)*0.025);
        minX=Math.max(0,minX-pad); minY=Math.max(0,minY-pad);
        maxX=Math.min(c.width-1,maxX+pad); maxY=Math.min(c.height-1,maxY+pad);
        const cw=maxX-minX+1, ch=maxY-minY+1;
        const scale=Math.min(1,820/cw);
        const c2=document.createElement("canvas");
        c2.width=Math.round(cw*scale); c2.height=Math.round(ch*scale);
        c2.getContext("2d").drawImage(c,minX,minY,cw,ch,0,0,c2.width,c2.height);
        resolve(c2.toDataURL("image/png"));
      }catch(err){ reject(err); }
    };
    img.onerror=()=>reject(new Error("bad image"));
    img.src=URL.createObjectURL(file);
  });
}

/* =========================================================
   BACKUP  /  RESTORE
   ========================================================= */
function exportData(){
  const blob=new Blob([JSON.stringify({
    app:"RehabPrescriptionPad",version:2,exported:new Date().toISOString(),
    settings:SETTINGS,prescriptions:SAVED
  },null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="rehab-prescription-backup-"+todayISO()+".json";
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
  toast("Backup exported");
}
$("#importFile").addEventListener("change",e=>{
  const file=e.target.files[0]; e.target.value="";
  if(!file) return;
  const reader=new FileReader();
  reader.onload=()=>{
    try{
      const data=JSON.parse(reader.result);
      if(!data||!data.settings) throw new Error("bad file");
      if(!confirm("Import this backup? It replaces your current settings and "+
        "merges in its saved prescriptions.")) return;
      SETTINGS=Object.assign(defaultSettings(),data.settings);
      if(!SETTINGS.customItems) SETTINGS.customItems={};
      const incoming=Array.isArray(data.prescriptions)?data.prescriptions:[];
      const ids=new Set(SAVED.map(r=>r.id));
      incoming.forEach(r=>{ if(r&&r.id&&!ids.has(r.id)) SAVED.push(r); });
      save(K_SET,SETTINGS); save(K_RX,SAVED);
      buildForm(); refreshPreview(); closeModal();
      toast("Backup imported");
    }catch(err){ toast("That file could not be read"); }
  };
  reader.readAsText(file);
});

let toastTimer=null;
function toast(msg){
  const t=$("#toast");
  t.textContent=msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove("show"),2600);
}
